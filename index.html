<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>F1 Live Tracker</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- Background Effects -->
  <div class="glow-bg top-left"></div>
  <div class="glow-bg bottom-right"></div>

  <!-- Header -->
  <header class="app-header glass">
    <div class="header-content">
      <div class="logo">
        <i data-lucide="flag-triangle-right" class="text-neon"></i>
        <h1>F1<span>LIVE</span></h1>
      </div>
      <div class="session-status">
        <span class="pulse-dot"></span>
        <span id="session-name">Fetching Session...</span>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="app-main">
    
    <!-- Tab Navigation -->
    <nav class="tab-nav glass">
      <button class="tab-btn active" data-tab="track">
        <i data-lucide="map"></i>
        <span>Track</span>
      </button>
      <button class="tab-btn" data-tab="standings">
        <i data-lucide="list-ordered"></i>
        <span>Standings</span>
      </button>
      <button class="tab-btn" data-tab="radio">
        <i data-lucide="radio"></i>
        <span>Radio</span>
      </button>
      <button class="tab-btn" data-tab="calendar">
        <i data-lucide="calendar"></i>
        <span>Calendar</span>
      </button>
    </nav>

    <!-- Content Panels -->
    <div class="tab-content active" id="track-tab">
      <div class="panel glass">
        <h2>Live Track Map</h2>
        <div class="track-container" id="track-map-container">
          <!-- Canvas will be injected here -->
          <canvas id="trackCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="tab-content" id="standings-tab">
      <div class="panel glass">
        <div class="standings-header">
          <h2>Live Standings</h2>
          <span class="lap-counter" id="lap-counter">Laps: --/--</span>
        </div>
        <div class="standings-list" id="standings-list">
          <!-- Standings rows injected here -->
          <div class="loading-state">Loading drivers...</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="radio-tab">
      <div class="panel glass">
        <h2>Team Radio</h2>
        <div class="radio-feed" id="radio-feed">
          <!-- Radio items injected here -->
           <div class="loading-state">Listening to feeds...</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="calendar-tab">
      <div class="panel glass">
        <h2>Season Calendar</h2>
        <div class="calendar-list" id="calendar-list">
          <div class="loading-state">Loading sessions...</div>
        </div>
      </div>
    </div>

  </main>

  <!-- Scripts -->
  <script src="js/f1-api.js"></script>
  <script src="js/trackMap.js"></script>
  <script src="js/standingsBoard.js"></script>
  <script src="js/radioFeed.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
